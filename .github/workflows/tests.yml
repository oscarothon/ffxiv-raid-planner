name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: pytest (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests/backend/ --tb=short

  frontend:
    name: vitest (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run vitest
        run: npm test

# Playwright E2E foi removido do CI por levar 15+ min para baixar browsers.
# Os specs em tests/e2e/ continuam no repo — rode localmente quando precisar:
#   npm run test:e2e
