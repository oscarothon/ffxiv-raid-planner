services:
  - type: web
    name: ffxiv-raid-planner
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server.app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/data.db
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
